version: 2

models:
  - name: fct_order_items
    description: |
      Fact table containing one row per product line item within an order.
      Combines order items with order and product information to provide
      a complete view of each order-product transaction.
    columns:
      - name: order_id
        description: "Foreign key to the order this line item belongs to."
        tests:
          - not_null
          - relationships:
              to: ref('stg_greenery__orders')
              field: order_id
      - name: product_id
        description: "Foreign key to the product on this order line."
        tests:
          - not_null
          - relationships:
              to: ref('stg_greenery__products')
              field: product_id
      - name: user_id
        description: "Foreign key to the user who placed the order."
        tests:
          - not_null
          - relationships:
              to: ref('stg_greenery__users')
              field: user_id
      - name: promo_id
        description: "Foreign key to the promo code applied to the order (if any)."
        tests:
          - relationships:
              to: ref('stg_greenery__promos')
              field: promo_id
      - name: address_id
        description: "Foreign key to the shipping address for this order."
        tests:
          - not_null
          - relationships:
              to: ref('stg_greenery__addresses')
              field: address_id
      - name: ordered_at
        description: "Timestamp when the order was placed."
        tests:
          - not_null
      - name: quantity
        description: "Number of units of the product ordered on this line item."
        tests:
          - not_null
      - name: item_revenue
        description: "Revenue from this order line item (quantity × product price)."
        tests:
          - not_null

  - name: dim_addresses
    description: "Dimension table containing one row per unique shipping address."
    columns:
      - name: address_id
        description: "Primary key — unique per address."
        tests:
          - not_null
          - unique
      - name: state
        description: "US state of the address — used for sales-by-state analysis."

  - name: fct_sales_stat
    description: "Sales statistics fact table."
